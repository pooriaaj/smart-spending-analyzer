name: Production Smoke Check

on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * *"

permissions:
  contents: read

env:
  FRONTEND_URL: https://www.zero2asset.com
  FALLBACK_FRONTEND_URL: https://smart-spending-analyzer.vercel.app
  BACKEND_URL: https://smart-spending-analyzer.onrender.com

jobs:
  smoke-check:
    name: Check deployed app health
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run public endpoint smoke checks
        run: python scripts/production_smoke_check.py
