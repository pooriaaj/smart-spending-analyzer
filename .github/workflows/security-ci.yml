name: Security CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: test_secret_key_for_ci_only_please_replace
      DATABASE_URL: sqlite:///./security_ci.db
      ENVIRONMENT: test
      FRONTEND_URL: http://localhost:5173
      USE_LLM_ASSISTANT: "false"
      LOCAL_OCR_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Run backend tests with coverage
        run: python -m pytest tests --cov=app --cov-report=term-missing
      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements.txt --cache-dir .pip-audit-cache
      - name: Run Bandit static scan
        run: python -m bandit -r app -c bandit.yaml

  frontend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
      - name: Run frontend tests with coverage
        run: npm run test:coverage
      - name: Build frontend
        run: npm run build

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
